name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # runs once a day at 00:00 UTC
  workflow_dispatch: {} # allows manual trigger from the Actions tab
  push:
    branches:
      - main # regenerate whenever you push to main (optional, remove if not needed)

permissions:
  contents: write # required to push the generated SVGs to the output branch

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake Animation SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: asad-developer99
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
